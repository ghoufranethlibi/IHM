<div class="shell">
  <header class="shell-header">
    <a routerLink="/dashboard" class="brand">MédiDossier</a>
    <nav class="shell-nav">
      <a
        *ngFor="let item of navItems; trackBy: trackByPath"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        {{ item.label }}
      </a>
    </nav>
    <button type="button" class="logout" (click)="logout()">Déconnexion</button>
  </header>
  <div class="breadcrumbs" *ngIf="breadcrumbs.length">
    <span class="crumb" *ngFor="let crumb of breadcrumbs; let last = last; trackBy: trackByCrumb" [class.current]="last">
      {{ crumb }}<span *ngIf="!last"> / </span>
    </span>
  </div>
  <main class="shell-main">
    <router-outlet></router-outlet>
  </main>
</div>
