<div class="login-page">
  <div class="login-card">
    <h1>Connexion</h1>
    <p class="hint">MédiDossier — accès sécurisé au dossier médical</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="username"
          [disabled]="loading"
        />
        <small class="field-error" *ngIf="form.controls.email.touched && form.controls.email.hasError('required')">
          Email requis.
        </small>
        <small class="field-error" *ngIf="form.controls.email.touched && form.controls.email.hasError('email')">
          Format d'email invalide.
        </small>
      </label>
      <label>
        <span>Mot de passe</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          [disabled]="loading"
        />
        <small class="field-error" *ngIf="form.controls.password.touched && form.controls.password.hasError('required')">
          Mot de passe requis.
        </small>
        <small class="field-error" *ngIf="form.controls.password.touched && form.controls.password.hasError('minlength')">
          Minimum 8 caractères.
        </small>
        <small class="field-error" *ngIf="form.controls.password.touched && form.controls.password.hasError('pattern')">
          Utilisez majuscule, minuscule et chiffre.
        </small>
      </label>

      <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <button type="submit" [disabled]="loading || form.invalid">
        <span class="spinner" *ngIf="loading" aria-hidden="true"></span>
        {{ loading ? 'Connexion…' : 'Se connecter' }}
      </button>
    </form>
    <a class="register-link" routerLink="/auth/register">Créer un nouveau compte</a>
  </div>
</div>
